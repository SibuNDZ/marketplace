# .github/workflows/ci.yml — place at the REPO root (projects/marketplace),
# not inside marketplace-api; paths below are relative to the repo root.
#
# Three jobs:
#   test     — mvnw verify with TestContainers (Docker is preinstalled on
#              ubuntu-latest runners; the 28-test suite including the
#              PostgreSQL concurrency tests runs unmodified)
#   image    — proves the Dockerfile builds; runs only after tests pass.
#              Build-only for now — pushing to a registry comes with the
#              deploy story, not the CI story.
#   frontend — tsc + vite build, path-filtered like the backend jobs.
#              Cloudflare Pages will also build independently on deploy,
#              but Pages is the deploy step, not the gate — this job is
#              the one to trust, and it's what catches a missing
#              _redirects or a dev-only import before a broken bundle
#              ever reaches Pages.

name: CI

on:
  push:
    branches: [master, main]
    paths:
      - "marketplace-backend/**"
      - "marketplace-frontend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "marketplace-backend/**"
      - "marketplace-frontend/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # TestContainers pulls postgres:16-alpine on cache miss;
                          # a hung container test should fail the run, not eat 6h
    defaults:
      run:
        working-directory: marketplace-backend/marketplace-api
    steps:
      - uses: actions/checkout@v4

      # Java 21 matches the pom's java.version target. Building on the exact
      # target version catches javadoc and tooling issues that --release alone
      # can miss, and keeps the CI/local gap minimal.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven   # caches ~/.m2 keyed on pom.xml hash

      - name: Run tests
        run: ./mvnw --no-transfer-progress verify

      # Surefire reports as artifacts when something fails — the difference
      # between "CI red" and knowing WHICH assertion failed without a rerun.
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: marketplace-backend/marketplace-api/target/surefire-reports/
          retention-days: 7

  image:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: marketplace-backend/marketplace-api
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t marketplace-api:ci .

      # Boot smoke: the container must start and fail for the RIGHT reason —
      # missing JWT_SECRET fail-fast — not a broken entrypoint or missing jar.
      # SPRING_AUTOCONFIGURE_EXCLUDE skips datasource/JPA/Flyway so those
      # can't fail first; JWT_SECRET is then the first unresolvable placeholder.
      - name: Container starts and fails fast on missing config
        run: |
          SPRING_AUTOCONFIGURE_EXCLUDE="org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration"
          set +e
          output=$(docker run --rm \
            -e "SPRING_AUTOCONFIGURE_EXCLUDE=$SPRING_AUTOCONFIGURE_EXCLUDE" \
            marketplace-api:ci 2>&1)
          set -e
          echo "$output" | grep -q "JWT_SECRET" \
            && echo "OK: container boots and fails fast on missing JWT_SECRET" \
            || { echo "Container failed for an unexpected reason:"; echo "$output" | tail -40; exit 1; }

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: marketplace-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: marketplace-frontend/package-lock.json

      # npm ci, not npm install — the lockfile is the contract.
      - run: npm ci

      # `npm run build` is `tsc -b && vite build` (see package.json) — one
      # step, not two, since a separate typecheck step would just repeat
      # the first half of this command. Dummy but valid-shaped
      # VITE_API_URL: this proves the build PIPELINE works (tsc, bundling,
      # _redirects present) and that the fail-fast guard in vite.config.ts
      # doesn't block a normal build — not that any specific deploy URL is
      # wired. Pages' own build supplies the real one.
      - name: Typecheck and build
        run: VITE_API_URL=https://ci-placeholder.invalid npm run build

      - name: SPA fallback file present in build output
        run: test -f dist/_redirects
