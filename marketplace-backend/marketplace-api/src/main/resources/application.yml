# Server Configuration
server:
  port: 8080

# Spring Configuration
spring:
  application:
    name: marketplace-api

  # JPA/Hibernate Configuration — Flyway owns the schema; Hibernate audits it
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Flyway — migrations live in db/migration, executed before Hibernate validates
  flyway:
    enabled: true
    locations: classpath:db/migration

# Logging Configuration
logging:
  level:
    com.marketplace.api: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Application Configuration
app:
  jwt:
    # No default — app fails fast at startup if JWT_SECRET is not set.
    # Dev fallback lives in application-dev.yml only.
    secret: ${JWT_SECRET}
    expiry-seconds: ${JWT_EXPIRY_SECONDS:86400}