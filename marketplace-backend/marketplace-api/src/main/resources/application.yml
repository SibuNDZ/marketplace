# Server Configuration
server:
  port: ${PORT:8080}  # Railway injects PORT; without this mapping Spring listens
                       # on 8080 while Railway probes the injected port — deploy loops.

# Spring Configuration
spring:
  application:
    name: marketplace-api

  # JPA/Hibernate Configuration — Flyway owns the schema; Hibernate audits it
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Flyway — migrations live in db/migration, executed before Hibernate validates
  flyway:
    enabled: true
    locations: classpath:db/migration

# Logging Configuration
logging:
  level:
    com.marketplace.api: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health  # health only — hide info/metrics from unauthenticated callers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true    # exposes /actuator/health/liveness + /readiness

# Application Configuration
app:
  jwt:
    # No default — app fails fast at startup if JWT_SECRET is not set.
    # Dev fallback lives in application-dev.yml only.
    secret: ${JWT_SECRET}
    # 15 minutes: short enough to limit a leaked token's window; refresh
    # tokens extend the session without forcing re-login.
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
    success-url: ${APP_FRONTEND_URL:http://localhost:4200}/checkout/success
    cancel-url: ${APP_FRONTEND_URL:http://localhost:4200}/checkout/cancelled
  orders:
    expiry-sweep-ms: 60000
  bootstrap:
    admin-email: ${APP_BOOTSTRAP_ADMIN_EMAIL:}
    admin-password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}

sentry:
  dsn: ${SENTRY_DSN:}             # blank = SDK disabled; dev needs nothing
  environment: ${SPRING_PROFILES_ACTIVE:dev}
  traces-sample-rate: 0.0       # errors only; perf tracing later if ever
  logging:
    minimum-event-level: error  # every log.error() becomes a Sentry event
    expiry-seconds: ${JWT_EXPIRY_SECONDS:900}
    # 7 days: refresh token lifetime. Rotate-on-use means an active user
    # never actually sees this expiry; it bounds abandoned sessions.
    refresh-expiry-seconds: ${REFRESH_TOKEN_EXPIRY_SECONDS:604800}