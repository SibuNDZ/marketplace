# Test-environment overrides for properties that have no application.yml default
# (fail-fast properties that require real env vars in production).
# These placeholder values are safe for test runs — no real Stripe account is hit.
app:
  stripe:
    secret-key: sk_test_placeholder_for_tests
    webhook-secret: whsec_placeholder_for_tests
    success-url: http://localhost:4200/checkout/success
    cancel-url: http://localhost:4200/checkout/cancelled
  orders:
    expiry-sweep-ms: 60000
  bootstrap:
    admin-email: ""
    admin-password: ""
  storage:
    r2:
      account-id: test-account-id
      access-key-id: test-access-key-id
      secret-access-key: test-secret-access-key
      bucket: erestyu-images-test
      public-base-url: https://images.erestyu.com
      # Individual tests that actually exercise storage (e.g.
      # ProductImageServiceTest) override account-id/keys/endpoint-override
      # via @DynamicPropertySource to point at a real MinIO testcontainer —
      # these are safe no-op placeholders for every other test.
